name: "Team Formation"
description: "Find teammates or announce your team for a hackathon"
title: "[Team] {team-name} — {hackathon-slug}"
labels: ["team-formation"]
body:
  - type: input
    id: hackathon
    attributes:
      label: "Hackathon Slug"
      placeholder: "ai-agent-challenge-2026"
    validations:
      required: true

  - type: input
    id: team_name
    attributes:
      label: "Team Name"
      placeholder: "team-alpha"
    validations:
      required: true

  - type: input
    id: track
    attributes:
      label: "Track Slug"
      placeholder: "ai-agent-framework"
    validations:
      required: true

  - type: dropdown
    id: purpose
    attributes:
      label: "Purpose"
      options:
        - "Looking for teammates"
        - "Announcing formed team"
    validations:
      required: true

  - type: textarea
    id: members
    attributes:
      label: "Current Team Members"
      description: "List GitHub usernames and roles"
      value: |
        - github: ""
          role: ""
    validations:
      required: true

  - type: textarea
    id: looking_for
    attributes:
      label: "Looking For"
      description: "Describe the roles and skills you need (if seeking teammates)"
      placeholder: "We need a frontend developer with React experience and a designer..."

  - type: textarea
    id: project_idea
    attributes:
      label: "Project Idea (optional)"
      description: "Brief description of what you plan to build"
      placeholder: "We're building an AI-powered..."
