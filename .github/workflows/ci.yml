name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc --noEmit --project apps/web/tsconfig.json

      - name: Test (shared)
        run: pnpm --filter @synnovator/shared test

      - name: Generate static data
        working-directory: apps/web
        run: node scripts/generate-static-data.mjs && node ../../scripts/generate-theme-css.mjs

      - name: Test (web)
        run: pnpm --filter @synnovator/web test
