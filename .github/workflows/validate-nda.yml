name: Validate NDA

on:
  issues:
    types: [edited, labeled]

jobs:
  validate:
    if: |
      contains(github.event.issue.labels.*.name, 'nda-sign') &&
      (github.event.action != 'labeled' || github.event.label.name == 'nda-sign')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install js-yaml

      - name: Parse and validate NDA
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const yaml = require('./node_modules/js-yaml');
            const issue = context.payload.issue;
            const title = issue.title;
            const body = issue.body || '';
            const author = issue.user.login;
            const errors = [];

            // 1. Parse title: [NDA] {username} — {hackathon-slug}
            const titleMatch = title.match(/\[NDA\]\s*(.*?)\s*—\s*(.*)/);
            if (!titleMatch) {
              errors.push('Issue title must match: [NDA] {username} — {hackathon-slug}');
            }
            const [, declaredUser, slug] = titleMatch || [null, '', ''];
            const trimmedSlug = slug.trim();
            const trimmedUser = declaredUser.trim();

            if (trimmedSlug) {
              // 2. Verify hackathon exists
              const hackathonPath = `hackathons/${trimmedSlug}/hackathon.yml`;
              if (!fs.existsSync(hackathonPath)) {
                errors.push(`Hackathon not found: ${trimmedSlug}`);
              } else {
                const data = yaml.load(fs.readFileSync(hackathonPath, 'utf8'));
                const h = data.hackathon;

                // 3. Verify legal.nda.required = true
                if (!h.legal || !h.legal.nda || h.legal.nda.required !== true) {
                  errors.push(`Hackathon "${trimmedSlug}" does not require NDA signing`);
                }
              }
            }

            // 4. Verify Issue author == declared username (anti-impersonation, case-insensitive)
            if (trimmedUser && trimmedUser.toLowerCase() !== author.toLowerCase()) {
              errors.push(`Username mismatch: title declares "${trimmedUser}" but Issue was filed by @${author}`);
            }

            // 5. Verify all checkboxes checked (no unchecked checkboxes)
            const unchecked = body.match(/- \[ \]/g);
            if (unchecked) {
              errors.push(`${unchecked.length} checkbox(es) not checked — all NDA confirmations are required`);
            }

            // 6. Verify profile exists (NDA signer must have a profile)
            if (trimmedUser) {
              const profilesDir = 'profiles';
              if (fs.existsSync(profilesDir)) {
                const profileFiles = fs.readdirSync(profilesDir).filter(f =>
                  f.endsWith('.yml') && !f.startsWith('_')
                );
                const profileFound = profileFiles.some(pf => {
                  try {
                    const profileData = yaml.load(fs.readFileSync(`${profilesDir}/${pf}`, 'utf8'));
                    return profileData?.hacker?.github?.toLowerCase() === author.toLowerCase();
                  } catch { return false; }
                });

                if (!profileFound) {
                  errors.push(`No profile found for @${author} in \`profiles/\`. Please create a profile first.`);
                }
              }
            }

            // 7 & 8. Report results
            if (errors.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `❌ **NDA validation failed:**\n\n@${author} 请修复以下问题：\n\n${errors.map(e => `- ${e}`).join('\n')}\n\nPlease fix and re-edit this issue.`,
              });
            } else {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['nda-approved', `hackathon:${trimmedSlug}`],
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ **NDA approved.** Thank you, @${author}! Your NDA confirmation for "${trimmedSlug}" has been recorded.`,
              });
            }
