name: Validate Hackathon

on:
  pull_request:
    paths:
      - 'hackathons/**/hackathon.yml'
      - 'docs/templates/**/hackathon.yml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Find changed hackathon files
        id: changed
        run: |
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- 'hackathons/**/hackathon.yml' 'docs/templates/**/hackathon.yml')
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Validate hackathon YAML files
        run: |
          FAILED=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            echo "─── Validating $file ───"
            if ! bash scripts/validate-hackathon.sh "$file"; then
              FAILED=1
            fi
          done <<< "${{ steps.changed.outputs.files }}"

          if [ "$FAILED" -eq 1 ]; then
            echo ""
            echo "::error::One or more hackathon YAML files failed validation"
            exit 1
          fi
