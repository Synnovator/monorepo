name: Upload Assets to R2

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'hackathons/**/assets/**'
      - 'hackathons/**/submissions/**'
      - 'profiles/**/assets/**'

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip -q awscliv2.zip
          sudo ./aws/install --update

      - name: Find asset files
        id: find
        run: |
          # Get changed asset files across all three contexts (non-YAML only)
          FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} HEAD -- \
            'hackathons/**/assets/**' \
            'hackathons/**/submissions/**' \
            'profiles/**/assets/**' \
            | grep -vE '\.(yml|yaml|mdx?)$' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -z "$FILES" ]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_files=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to R2
        if: steps.find.outputs.has_files == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue
            echo "Uploading $file..."
            aws s3 cp "$file" "s3://${R2_BUCKET}/${file}" \
              --endpoint-url "${R2_ENDPOINT}"
            echo "  -> s3://${R2_BUCKET}/${file}"
          done <<< "${{ steps.find.outputs.files }}"

      - name: Update YAML metadata with R2 URLs
        if: steps.find.outputs.has_files == 'true'
        env:
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            [ ! -f "$file" ] && continue

            BASENAME=$(basename "$file")
            DIR=$(dirname "$file")
            R2_URL="${R2_ENDPOINT}/${R2_BUCKET}/${file}"

            # Determine context and find the appropriate YAML metadata file
            METADATA_YML=""
            if echo "$file" | grep -qE '^profiles/.+/assets/'; then
              # Profile-level asset: look for profile.yml in parent
              CANDIDATE="${DIR}/../profile.yml"
              [ -f "$CANDIDATE" ] && METADATA_YML="$CANDIDATE"
            elif echo "$file" | grep -qE '^hackathons/.+/submissions/.+/'; then
              # Submission-level asset: walk up to find project.yml
              SEARCH_DIR="$DIR"
              while [ ! -f "${SEARCH_DIR}/project.yml" ] && [ "$SEARCH_DIR" != "." ]; do
                SEARCH_DIR=$(dirname "$SEARCH_DIR")
              done
              [ -f "${SEARCH_DIR}/project.yml" ] && METADATA_YML="${SEARCH_DIR}/project.yml"
            elif echo "$file" | grep -qE '^hackathons/.+/assets/'; then
              # Hackathon-level asset: look for hackathon.yml in parent
              CANDIDATE="${DIR}/../hackathon.yml"
              [ -f "$CANDIDATE" ] && METADATA_YML="$CANDIDATE"
            fi

            if [ -n "$METADATA_YML" ] && [ -f "$METADATA_YML" ]; then
              sed -i "s|local_path: \"./${BASENAME}\"|local_path: \"./${BASENAME}\"\n        r2_url: \"${R2_URL}\"|" "$METADATA_YML" 2>/dev/null || true
              echo "Updated $METADATA_YML with R2 URL for $BASENAME"
            else
              echo "No metadata YAML found for $file (upload-only)"
            fi
          done <<< "${{ steps.find.outputs.files }}"

      - name: Commit R2 URL updates
        if: steps.find.outputs.has_files == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git add -A
            git commit -m "chore: update R2 URLs for uploaded assets [skip ci]"
            git push
          fi
