name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

# Cancel in-progress runs for the same PR/branch
concurrency:
  group: deploy-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: apps/web
        run: pnpm exec opennextjs-cloudflare build

      - name: Deploy Production
        if: github.event_name == 'push'
        working-directory: apps/web
        run: pnpm exec wrangler deploy --message "deploy-main@${GITHUB_SHA::7}-by-github-actions"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy Preview
        if: github.event_name == 'pull_request'
        id: preview
        working-directory: apps/web
        run: |
          PREVIEW_NAME="synnovator-pr-${{ github.event.pull_request.number }}"
          DEPLOY_LOG=$(mktemp)
          pnpm exec wrangler deploy --name "$PREVIEW_NAME" --message "pr-${{ github.event.pull_request.number }}@${GITHUB_SHA::7}-by-github-actions" 2>&1 | tee "$DEPLOY_LOG"
          PREVIEW_URL=$(grep -oE 'https://[a-zA-Z0-9._-]+\.workers\.dev' "$DEPLOY_LOG" | tail -1)
          echo "url=${PREVIEW_URL:?deploy did not output a workers.dev URL}" >> "$GITHUB_OUTPUT"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Inject Preview Secrets
        if: github.event_name == 'pull_request'
        working-directory: apps/web
        run: |
          PREVIEW_NAME="synnovator-pr-${{ github.event.pull_request.number }}"
          echo "$AUTH_SECRET" | pnpm exec wrangler secret put AUTH_SECRET --name "$PREVIEW_NAME"
          echo "$GITHUB_APP_PRIVATE_KEY" | pnpm exec wrangler secret put GITHUB_APP_PRIVATE_KEY --name "$PREVIEW_NAME"
          echo "$GITHUB_CLIENT_SECRET" | pnpm exec wrangler secret put GITHUB_CLIENT_SECRET --name "$PREVIEW_NAME"
          echo "$DEV_ADMIN_PASSWORD" | pnpm exec wrangler secret put DEV_ADMIN_PASSWORD --name "$PREVIEW_NAME"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GITHUB_APP_PRIVATE_KEY: ${{ secrets.GITHUB_APP_PRIVATE_KEY }}
          GITHUB_CLIENT_SECRET: ${{ secrets.GITHUB_CLIENT_SECRET }}
          DEV_ADMIN_PASSWORD: ${{ secrets.DEV_ADMIN_PASSWORD }}

      - name: Comment Preview URL
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `🚀 Preview deployed: ${{ steps.preview.outputs.url }}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.startsWith('🚀 Preview deployed:'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

